<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rigel</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: white;
    }

    .logo {
      width: 190px;
      opacity: 0;
      transform: scale(0.8);
      animation: fadeIn 1s ease forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>

<body>

  <img src="Images/Rigellogowhite3.jpg" class="logo" alt="Rigel Logo">

  <script>
    setTimeout(() => {
      window.location.href = "rigelhome.html";
    }, 1500); // 1.5 second delay
  </script>

</body>
</html>
