<script>
document.getElementById("contact-form").addEventListener("submit", async function(event) {
    event.preventDefault();

    const form = event.target;
    const formData = new FormData(form);

    try {
        const response = await fetch("https://formspree.io/f/xzdojkqy", {
            method: "POST",
            body: formData,
            headers: {
                'Accept': 'application/json'
            }
        });

        if (response.ok) {
            // Redirect to your custom page
            window.location.href = "formthank.html";
        } else {
            alert("Form submission failed.");
        }

    } catch (error) {
        alert("Something went wrong.");
    }
});
</script>

<!---------------------------------------Back To Top Button Starts Here------------------------------------------------>
<button id="backToTop">⇧</button>

<script>
  const backToTop = document.getElementById("backToTop");

  window.addEventListener("scroll", () => {

    // total scrollable height
    const scrollHeight =
      document.documentElement.scrollHeight -
      document.documentElement.clientHeight;

    // current scroll %
    const scrollPercent =
      (window.scrollY / scrollHeight) * 100;

    // show button after 30%
    if (scrollPercent > 30 && window.innerWidth <= 768) {
      backToTop.style.display = "block";
    } else {
      backToTop.style.display = "none";
    }
  });

  // smooth scroll to top
  backToTop.addEventListener("click", () => {
    window.scrollTo({
      top: 0,
      behavior: "smooth"
    });
  });
</script>
