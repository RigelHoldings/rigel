<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simple UPI Payment</title>

  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #111827;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 420px;
      background: #1f2937;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h1 {
      margin-top: 0;
      text-align: center;
      font-size: 28px;
    }

    .subtitle {
      text-align: center;
      color: #9ca3af;
      margin-bottom: 24px;
      font-size: 14px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      margin-top: 18px;
      font-size: 14px;
      color: #d1d5db;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: #374151;
      color: white;
      font-size: 16px;
    }

    button {
      width: 100%;
      margin-top: 22px;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #10b981;
      color: white;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    button:hover {
      background: #059669;
    }

    .qr-section {
      margin-top: 28px;
      text-align: center;
      display: none;
    }

    #qrcode {
      background: white;
      padding: 12px;
      border-radius: 14px;
      display: inline-block;
      margin-top: 10px;
    }

    .upi-link {
      display: block;
      margin-top: 20px;
      text-decoration: none;
      background: #2563eb;
      padding: 14px;
      border-radius: 12px;
      color: white;
      font-weight: bold;
    }

    .upi-link:hover {
      background: #1d4ed8;
    }

    .note {
      margin-top: 18px;
      font-size: 13px;
      color: #9ca3af;
      text-align: center;
      line-height: 1.5;
    }

    .footer {
      margin-top: 24px;
      text-align: center;
      font-size: 12px;
      color: #6b7280;
    }

  </style>
</head>
<body>

  <div class="container">

    <h1>UPI Payment</h1>

    <div class="subtitle">
      Tiny payment page for civilized humans who hate payment gateways.
    </div>

    <label>UPI ID</label>
    <input type="text" id="upiId" placeholder="yourupi@bank" />

    <label>Name</label>
    <input type="text" id="name" placeholder="Your Name" />

    <label>Amount (₹)</label>
    <input type="number" id="amount" placeholder="499" />

    <label>Note (optional)</label>
    <input type="text" id="note" placeholder="Invoice / Product / Whatever" />

    <button onclick="generatePayment()">
      Generate QR
    </button>

    <div class="qr-section" id="qrSection">

      <h2>Scan & Pay</h2>

      <div id="qrcode"></div>

      <a class="upi-link" id="payBtn" href="#">
        Open UPI App
      </a>

      <div class="note">
        If the button doesn't work, scan the QR using any UPI app.<br>
        Humanity somehow standardized this correctly. A miracle.
      </div>

    </div>

    <div class="footer">
      No Razorpay. No Stripe. No VC-backed middlemen harvesting your soul.
    </div>

  </div>

  <script>

    function generatePayment() {

      const upiId = document.getElementById("upiId").value.trim();
      const name = document.getElementById("name").value.trim();
      const amount = document.getElementById("amount").value.trim();
      const note = document.getElementById("note").value.trim();

      if (!upiId || !name || !amount) {
        alert("Please fill all required fields.");
        return;
      }

      const upiLink =
        `upi://pay?pa=${encodeURIComponent(upiId)}` +
        `&pn=${encodeURIComponent(name)}` +
        `&am=${encodeURIComponent(amount)}` +
        `&cu=INR` +
        `&tn=${encodeURIComponent(note)}`;

      const qrContainer = document.getElementById("qrcode");

      qrContainer.innerHTML = "";

      QRCode.toCanvas(upiLink, {
        width: 260
      }, function (error, canvas) {

        if (error) {
          console.error(error);
          alert("QR generation failed.");
          return;
        }

        qrContainer.appendChild(canvas);

      });

      document.getElementById("payBtn").href = upiLink;

      document.getElementById("qrSection").style.display = "block";

    }

  </script>

</body>
</html>
